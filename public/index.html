<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>늘푸른교회 자막 만들기</title>
  <style>
    :root {
      --bg: #1a1f2e;
      --card: #252b3b;
      --text: #e6edf3;
      --muted: #8b949e;
      --accent: #2ea043;
      --accent-hover: #3fb950;
      --red: #f85149;
      --border: #30363d;
    }
    * { box-sizing: border-box; }
    body {
      font-family: "Pretendard", "Malgun Gothic", sans-serif;
      background: var(--bg);
      color: var(--text);
      margin: 0;
      padding: 24px;
      line-height: 1.5;
    }
    h1 { font-size: 1.5rem; margin-top: 0; color: var(--text); }
    h2 { font-size: 1.1rem; color: var(--muted); margin-top: 24px; }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 20px;
    }
    label { display: block; margin-bottom: 8px; color: var(--muted); font-size: 0.9rem; }
    input[type="file"] { margin-bottom: 12px; }
    button, .btn {
      background: var(--accent);
      color: #fff;
      border: none;
      padding: 10px 18px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.95rem;
    }
    button:hover, .btn:hover { background: var(--accent-hover); }
    button:disabled { opacity: 0.6; cursor: not-allowed; }
    textarea {
      width: 100%;
      min-height: 120px;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: #0d1117;
      color: var(--text);
      font-family: inherit;
      font-size: 14px;
      resize: vertical;
    }
    textarea.code { min-height: 200px; font-family: "Consolas", "Monaco", monospace; font-size: 13px; }
    .red { color: var(--red); }
    .summary { white-space: pre-wrap; background: #0d1117; padding: 12px; border-radius: 8px; font-size: 0.9rem; max-height: 200px; overflow-y: auto; }
    .step { margin-bottom: 28px; }
    .step-num { display: inline-block; width: 26px; height: 26px; background: var(--accent); color: #fff; border-radius: 50%; text-align: center; line-height: 26px; font-size: 0.9rem; margin-right: 8px; font-weight: bold; }
    a { color: var(--accent); }
    .error { color: var(--red); margin-top: 8px; }
    .hint { color: var(--muted); font-size: 0.85rem; margin-top: 4px; }
    .btn-group { margin-top: 8px; }
    .btn-group button { margin-right: 8px; }
  </style>
</head>
<body>
  <h1>늘푸른교회 자막 만들기</h1>
  <p class="muted">(1) 원고 첨부 → (2) 설교 코드 자동 생성 → (3) 찬송/카드 입력 → (4) 파일 추출</p>

  <div class="step">
    <h2><span class="step-num">1</span> 원고 DOCX 첨부</h2>
    <div class="card">
      <label>설교 원고 파일 (본문/인용 구절은 빨간색으로 표시)</label>
      <input type="file" id="docxFile" accept=".docx" />
      <button type="button" id="btnParse">파싱하기</button>
      <div id="parseError" class="error"></div>
      <div id="parseResult" style="margin-top: 12px; display: none;"></div>
      <div id="codeGenArea" style="margin-top: 12px; display: none;">
        <button type="button" id="btnGenCode">설교 자막 코드 자동 생성</button>
        <span id="codeGenError" class="error"></span>
      </div>
    </div>
  </div>

  <div class="step">
    <h2><span class="step-num">2</span> 찬송가(hymn) 추가</h2>
    <div class="card">
      <label>찬송가 내용 (한 곡당 아래 형식으로, 곡 사이는 빈 줄로 구분)</label>
      <textarea id="hymnTxtContent" placeholder="제목&#10;------&#10;1절 가사...&#10;2절 가사...&#10;&#10;다음 곡 제목&#10;------&#10;가사..."></textarea>
      <p class="hint">형식: 첫 줄에 제목, 다음 줄에 ------ , 그 다음 줄부터 가사. 여러 곡은 빈 줄로 구분.</p>
      <label style="margin-top:12px;">이번 주 찬송 순서 (한 줄에 한 곡 제목, 위에서 넣은 제목과 같게)</label>
      <textarea id="hymnList" style="min-height:60px" placeholder="임재&#10;좋으신 하나님&#10;내가 매일 기쁘게"></textarea>
      <p class="hint">PPT에 넣을 찬송가 제목을 순서대로 적으세요. 비우면 찬송 슬라이드를 넣지 않습니다.</p>
    </div>
  </div>

  <div class="step">
    <h2><span class="step-num">3</span> 카드 슬라이드 (선택)</h2>
    <div class="card">
      <label>카드 슬라이드 텍스트 (한 줄에 하나, 예: 통성기도, 대표기도, 광고, 축도)</label>
      <textarea id="cardSlides" style="min-height:80px" placeholder="통성기도&#10;대표기도&#10;광고&#10;축도"></textarea>
    </div>
  </div>

  <div class="step">
    <h2><span class="step-num">4</span> 설교 자막 코드 &amp; 파일 추출</h2>
    <div class="card">
      <label>설교 자막 코드 (1단계에서 자동 생성 후 필요하면 수정)</label>
      <textarea id="codeInput" class="code" placeholder="add_bible_slide(prs, directory, &quot;로마서&quot;, &quot;8:11&quot;)&#10;add_subtitle_slide(prs, input_text=&quot;제목 (로마서 8:11)&quot;)&#10;..."></textarea>
      <div class="btn-group">
        <button type="button" id="btnGenerate">PPTX 생성 후 다운로드</button>
      </div>
      <div id="genError" class="error"></div>
    </div>
  </div>

  <script>
    const docxFile = document.getElementById("docxFile");
    const btnParse = document.getElementById("btnParse");
    const parseError = document.getElementById("parseError");
    const parseResult = document.getElementById("parseResult");
    const codeGenArea = document.getElementById("codeGenArea");
    const btnGenCode = document.getElementById("btnGenCode");
    const codeGenError = document.getElementById("codeGenError");
    const hymnTxtContent = document.getElementById("hymnTxtContent");
    const hymnList = document.getElementById("hymnList");
    const cardSlides = document.getElementById("cardSlides");
    const codeInput = document.getElementById("codeInput");
    const btnGenerate = document.getElementById("btnGenerate");
    const genError = document.getElementById("genError");

    let lastParsed = null;

    btnParse.addEventListener("click", async () => {
      parseError.textContent = "";
      parseResult.style.display = "none";
      codeGenArea.style.display = "none";
      codeGenError.textContent = "";
      const file = docxFile.files[0];
      if (!file) {
        parseError.textContent = "DOCX 파일을 선택해 주세요.";
        return;
      }
      const form = new FormData();
      form.append("file", file);
      try {
        const res = await fetch("/api/parse_docx", { method: "POST", body: form });
        const data = await res.json();
        if (!res.ok) throw new Error(data.detail || data.message || "파싱 실패");
        lastParsed = data.parsed;
        let html = "<p><strong>RED(#FF0000)로 추출된 텍스트 (순서대로):</strong></p>";
        if (data.red_summary && data.red_summary.length) {
          html += '<div class="summary">' + data.red_summary.map((t) => t || "(빈 줄)").join("\n") + "</div>";
        } else {
          html += '<div class="summary">(빨간색으로 표시된 런이 없습니다.)</div>';
        }
        parseResult.innerHTML = html;
        parseResult.style.display = "block";
        codeGenArea.style.display = "block";
      } catch (e) {
        parseError.textContent = e.message || "요청 실패";
      }
    });

    btnGenCode.addEventListener("click", async () => {
      if (!lastParsed) {
        codeGenError.textContent = "먼저 DOCX를 업로드하고 파싱하세요.";
        return;
      }
      codeGenError.textContent = "";
      btnGenCode.disabled = true;
      btnGenCode.textContent = "생성 중...";
      try {
        const res = await fetch("/api/generate_sermon_code", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ parsed: lastParsed }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.detail || data.message || "코드 생성 실패");
        if (data.code) codeInput.value = data.code;
      } catch (e) {
        codeGenError.textContent = e.message || "요청 실패";
      } finally {
        btnGenCode.disabled = false;
        btnGenCode.textContent = "설교 자막 코드 자동 생성";
      }
    });

    btnGenerate.addEventListener("click", async () => {
      genError.textContent = "";
      const code = codeInput.value.trim();
      const hymns = hymnList.value.trim().split("\n").map((s) => s.trim()).filter(Boolean);
      const cards = cardSlides.value.trim().split("\n").map((s) => s.trim()).filter(Boolean);
      const hymnTxt = hymnTxtContent.value.trim();
      if (!code) {
        genError.textContent = "설교 자막 코드가 비어 있습니다. 1단계에서 '설교 자막 코드 자동 생성'을 누르거나 직접 입력하세요.";
        return;
      }
      try {
        const res = await fetch("/api/generate_pptx", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            code,
            hymn_list: hymns,
            card_slides: cards,
            hymn_txt_content: hymnTxt || undefined,
          }),
        });
        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          throw new Error(err.detail || err.message || res.statusText);
        }
        const blob = await res.blob();
        const name = res.headers.get("content-disposition")?.match(/filename="?([^";]+)"?/)?.[1] || "sermon.pptx";
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = name;
        a.click();
        URL.revokeObjectURL(a.href);
      } catch (e) {
        genError.textContent = e.message || "생성 실패";
      }
    });
  </script>
</body>
</html>
